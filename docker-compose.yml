networks:
  proxy:
    external: true

volumes:
  gyoum-data:
    external: true

services:
  backend:
    container_name: gyoum-backend
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      GYOUM_DATABASE_URL: "sqlite:////app/data/gyoum.db"
    expose:
      - "8000"
    volumes:
      - gyoum-data:/app/data
    networks:
      - proxy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
